        .games-container { border: 3px solid #6E9F94; padding: 20px; border-radius: 8px; margin: 20px auto; max-width: 900px; color: #ADBFDA; }

        .play-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #e63946; color: #ffffff; border: none; border-radius: 8px; padding: 16px 34px; font-size: 1.4em; font-weight: 900; letter-spacing: 2px; cursor: pointer; box-shadow: 0 6px 14px rgba(0,0,0,0.45); transition: transform .1s ease, filter .2s ease; }

        .play-button:active { transform: translate(-50%, calc(-50% + 1px)) scale(0.99); }
        .bonk-wrapper { position: relative; display: block; max-width: 560px; width: 100%; margin: 0 auto 12px; }
        @media (max-width: 480px) { .server-ip-container { flex-direction: column; align-items: flex-start; } .server-ip { width: 100%; border-radius: 4px 4px 0 0; border-right: 1px solid #6E9F94; border-bottom: none; text-align: center; } .copy-button { width: 100%; border-radius: 0 0 4px 4px; border-top: none; } .copy-message { margin-left: 0; margin-top: 5px; width: 100%; text-align: center; } }
